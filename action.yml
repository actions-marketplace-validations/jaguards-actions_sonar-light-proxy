name: 'Sonar Light Proxy'
description: 'Lightweight GH Actions for a local HTTP reverse-proxy that injects custom headers into every request forwarded to SonarQube'
author: 'jaguards-actions'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  sonar-host-url:
    description: 'Target SonarQube / SonarCloud URL (e.g. https://sonar.example.com)'
    required: true
  headers:
    description: >
      JSON object of additional HTTP headers to inject into every upstream
      request.  Example: '{"X-Api-Key":"secret","X-Forwarded-Proto":"https"}'
    required: false
    default: '{}'
  proxy-port:
    description: 'Local TCP port the proxy will listen on (must be free on the runner)'
    required: false
    default: '9000'

outputs:
  proxy-url:
    description: 'Local proxy URL to substitute as SONAR_HOST_URL in subsequent steps'

runs:
  using: "node20"
  main: "main.js"
  post: "post.js"
  post-if: "always()"

