name: 'Patch SonarQube report-task.txt'
description: >
  Rewrites the serverUrl, ceTaskUrl and dashboardUrl entries inside the
  report-task.txt file produced by the SonarQube scanner so that the
  sonarqube-quality-gate-action routes its requests through the local
  proxy instead of hitting the upstream server directly.
author: 'brandon'

branding:
  icon: 'edit-2'
  color: 'blue'

inputs:
  proxy-url:
    description: >
      Local proxy URL produced by the sonar-light-proxy action
      (e.g. http://127.0.0.1:9000).  Every occurrence of the upstream
      serverUrl found in report-task.txt will be replaced with this value.
    required: true
  report-task-path:
    description: 'Path to the report-task.txt file generated by the scanner'
    required: false
    default: '.scannerwork/report-task.txt'

runs:
  using: 'composite'
  steps:
    - name: Patch report-task.txt
      shell: bash
      env:
        PROXY_URL: ${{ inputs.proxy-url }}
        REPORT_TASK_PATH: ${{ inputs.report-task-path }}
      run: |
        node "${{ github.action_path }}/patch-report-task.js"

